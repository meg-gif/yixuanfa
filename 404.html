<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>页面跳转中 - 海媒通</title>
    <script>
      const path = window.location.pathname;
      const base = path.includes("/") ? path.slice(0, path.lastIndexOf("/") + 1) : "/";
      window.location.replace(`${window.location.origin}${base}index.html${window.location.hash || "#/"}`);
    </script>
  </head>
  <body>
    <p>页面跳转中...</p>
  </body>
</html>
